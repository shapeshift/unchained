services:
  unchained-local-go-cosmos:
    image: unchained-local-go-cosmos
    build:
      context: ./build
      dockerfile: Dockerfile.local

  api:
    image: unchained-local-go-cosmos
    environment:
      - GOCACHE=/tmp
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.cosmos-api.rule=Host(`api.cosmos.localhost`)'
      - 'traefik.http.services.cosmos-api.loadbalancer.server.port=3000'
    command: ["sh", "-c", "reflex -r '(pkg|shared|cosmos)' -R 'swagger' -s -- sh -c 'swagger generate spec -w coinstacks/cosmos -o coinstacks/cosmos/api/swagger.json -x protoc-gen-openapiv2 -m && go run coinstacks/cosmos/cmd/main.go -env coinstacks/cosmos/.env'"]
    working_dir: /app
    volumes:
      - ../..:/app
      - $GOPATH/pkg/mod/cache:/go/pkg/mod/cache
    networks:
      - cosmos

networks:
  cosmos:
    name: cosmos
    external: true