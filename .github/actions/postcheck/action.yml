name: Postcheck
description: Check and commit generated swagger.json files

runs:
  using: composite
  steps:
    - name: Check for generated changes
      id: check
      shell: bash
      run: |
        if git diff --name-only | grep -q 'swagger.json'; then
          echo "has_changes=true" >> $GITHUB_OUTPUT
          echo "::warning::swagger.json files are out of date"
          git diff --name-only | grep 'swagger.json'
        else
          echo "has_changes=false" >> $GITHUB_OUTPUT
        fi

    - name: Fail if stale (PR)
      if: steps.check.outputs.has_changes == 'true' && github.event_name == 'pull_request'
      shell: bash
      run: |
        echo "::error::swagger.json files are out of date. Regenerate and commit."
        exit 1

    - name: Commit changes (push)
      if: steps.check.outputs.has_changes == 'true' && github.event_name == 'push'
      shell: bash
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add '**/swagger.json'
        git commit -m "chore: update openapi spec [skip ci]"
        git push
